<script>
function search() {
  var input = document.getElementById("search").value.toLowerCase();
  var bikes = document.getElementsByClassName("bike-card");

  for (var i = 0; i < bikes.length; i++) {
    if (bikes[i].innerText.toLowerCase().includes(input)) {
      bikes[i].style.display = "flex";
    } else {
      bikes[i].style.display = "none";
    }
  }
}


var params = new URLSearchParams(window.location.search);
if (params.get("q")) {
  document.getElementById("search").value = params.get("q");
  search();
}
</script>
